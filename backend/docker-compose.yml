version: '3.8'

services:
  backend:
    build: .
    container_name: community_backend
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - DB_USER=postgres
      - DB_HOST=db
      - DB_NAME=community_app
      - DB_PASSWORD=bps
      - DB_PORT=5432
      - JWT_SECRET=supersecretjwtkey_change_in_production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads

  db:
    image: postgres:15-alpine
    container_name: community_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=bps
      - POSTGRES_DB=community_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount the schema.sql so Postgres initializes the DB automatically on first boot
      - ../schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d community_app"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
