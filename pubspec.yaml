name: community_app
description: A location-based community chat application with nearby user discovery, private messaging, and community groups.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Theming
  cupertino_icons: ^1.0.9
  google_fonts: ^8.0.0
  
  # State Management
  provider: ^6.1.1
  
  # Networking & API
  dio: ^5.9.0
  socket_io_client: ^3.1.0
  
  # Local Storage
  shared_preferences: ^2.5.0
  
  # Location Services
  geolocator: ^14.0.0
  permission_handler: ^12.0.0
  
  # Image Handling
  image_picker: ^1.2.0
  
  # Utilities
  intl: ^0.20.0
  package_info_plus: ^10.0.0
  geocoding: ^4.0.0
  
  # Map
  flutter_map: ^8.2.0
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  # Uncomment and add assets when needed
  # assets:
  #   - assets/images/
  #   - assets/icons/
